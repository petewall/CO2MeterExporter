name: Lint and test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-dev libusb-1.0-0-dev libudev-dev

      - name: Install Python dependencies
        run: pip install pipenv && pipenv install --dev

      - name: Lint
        run: make lint

      - name: Test
        run: make test
